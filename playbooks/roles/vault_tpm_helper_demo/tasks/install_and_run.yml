# Diagnostics: Verify certificate and key match
- name: Extract public key from certificate
  ansible.builtin.shell:
    cmd: openssl x509 -in /opt/vault-tpm-demo/client.cert.pem -pubkey -noout
  register: vault_tpm_helper_demo_cert_pubkey
  changed_when: false

- name: Extract public key from TPM private key
  ansible.builtin.shell:
    cmd: |
      openssl pkey -provider default -provider tpm2 \
        -in /opt/vault-tpm-demo/client.key.pem -pubout
  register: vault_tpm_helper_demo_key_pubkey
  changed_when: false
  environment:
    OPENSSL_MODULES: /usr/lib64/ossl-modules

- name: Compare public keys
  ansible.builtin.debug:
    msg:
      - "=== Public Key Comparison ==="
      - "Certificate public key matches private key: {{ vault_tpm_helper_demo_cert_pubkey.stdout == vault_tpm_helper_demo_key_pubkey.stdout }}"
      - "{% if vault_tpm_helper_demo_cert_pubkey.stdout != vault_tpm_helper_demo_key_pubkey.stdout %}⚠️  WARNING: Keys do not match! Certificate was not signed from this TPM key!{% endif %}"

- name: Check certificate algorithm
  ansible.builtin.command:
    cmd: openssl x509 -in /opt/vault-tpm-demo/client.cert.pem -noout -text
  register: vault_tpm_helper_demo_cert_details
  changed_when: false

- name: Show certificate signature algorithm
  ansible.builtin.debug:
    msg: "{{ vault_tpm_helper_demo_cert_details.stdout_lines | select('search', 'Signature Algorithm') | list }}"

# Step 3: Run vault-tpm-helper to authenticate
- name: Authenticate to Vault using vault-tpm-helper
  ansible.builtin.shell:
    cmd: |
      /usr/local/bin/vault-tpm-helper \
        -client-cert /opt/vault-tpm-demo/client.cert.pem \
        -client-key /opt/vault-tpm-demo/client.key.pem \
        -ca /opt/vault-tpm-demo/ca-bundle.pem \
        -vaultaddr {{ vault_addr }} \
        -name tls-auth \
        -debug
  register: vault_tpm_helper_demo_token_output
  changed_when: false

- name: Extract Vault token from output (last line after debug output)
  ansible.builtin.set_fact:
    vault_tpm_helper_demo_token: "{{ vault_tpm_helper_demo_token_output.stdout_lines | select('match', '^hvs\\..*') | first | default(vault_tpm_helper_demo_token_output.stdout_lines[-1]) }}"

- name: Display authentication result
  ansible.builtin.debug:
    msg:
      - "✅ Successfully authenticated to Vault using TPM-backed TLS certificate!"
      - "Vault Token: {{ vault_tpm_helper_demo_token }}"
      - "Token can be used for subsequent Vault operations"

# Step 4: Demonstrate using the token
- name: Test token by reading Vault sys health
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/sys/health"
    method: GET
    headers:
      X-Vault-Token: "{{ vault_tpm_helper_demo_token }}"
    validate_certs: false
    return_content: true
  register: vault_tpm_helper_demo_health_check
  failed_when: false

- name: Show health check result
  ansible.builtin.debug:
    msg:
      - "Health check using TPM-authenticated token:"
      - "Status: {{ vault_tpm_helper_demo_health_check.status }}"
      - "Initialized: {{ vault_tpm_helper_demo_health_check.json.initialized | default('N/A') }}"
      - "Sealed: {{ vault_tpm_helper_demo_health_check.json.sealed | default('N/A') }}"

# Step 5: Demonstrate reading a secret (if accessible)
- name: Attempt to read a KV secret (optional demo)
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/secret/data/demo"
    method: GET
    headers:
      X-Vault-Token: "{{ vault_tpm_helper_demo_token }}"
    validate_certs: false
    return_content: true
    status_code: [200, 403, 404]
  register: vault_tpm_helper_demo_secret_read
  failed_when: false

- name: Show secret read result
  ansible.builtin.debug:
    msg:
      - "Secret read attempt result:"
      - "Status: {{ vault_tpm_helper_demo_secret_read.status }}"
      - "{% if vault_tpm_helper_demo_secret_read.status == 200 %}Secret data retrieved successfully{% elif vault_tpm_helper_demo_secret_read.status == 403 %}Access denied (expected if TLS auth role doesn't have KV permissions){% else %}Secret not found or path doesn't exist{% endif %}"

- name: Demo summary
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "vault-tpm-helper Demo Summary"
      - "=========================================="
      - "✅ TPM key generated in TSS2 format"
      - "✅ CSR created and signed by Vault PKI"
      - "✅ vault-tpm-helper authenticated using TPM-backed certificate"
      - "✅ Vault token obtained: {{ vault_tpm_helper_demo_token[:20] }}..."
      - "✅ Token validated with Vault API calls"
      - ""
      - "🔑 Private key location: /opt/vault-tpm-demo/client.key.pem (TSS2 format, references TPM)"
      - "📜 Certificate location: /opt/vault-tpm-demo/client.cert.pem"
      - "🔐 Authentication method: Mutual TLS with TPM-protected private key"
      - "=========================================="
