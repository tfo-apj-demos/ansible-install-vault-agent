---
# roles/vault_tpm_helper_demo/tasks/main.yml
# Demonstrates vault-tpm-helper for TLS authentication to Vault using TPM-backed keys

- name: Ensure required packages are installed
  ansible.builtin.package:
    name:
      - tpm2-tools
      - tpm2-openssl
      - openssl
      - wget
      - jq
    state: present
  ignore_errors: true

- name: Create demo directory
  ansible.builtin.file:
    path: /opt/vault-tpm-demo
    state: directory
    mode: "0755"

- name: Check multiple possible TPM2 provider locations
  ansible.builtin.find:
    paths:
      - /usr/lib64/ossl-modules
      - /usr/local/lib64/ossl-modules
      - /usr/lib/ossl-modules
      - /usr/local/lib/ossl-modules
      - /opt/tpm2-openssl
    patterns: 'tpm2.so'
    recurse: yes
  register: vault_tpm_helper_demo_tpm2_provider_search

- name: Display found TPM2 provider locations
  ansible.builtin.debug:
    msg: "Found TPM2 providers: {{ vault_tpm_helper_demo_tpm2_provider_search.files | map(attribute='path') | list }}"

- name: Set TPM2 provider path
  ansible.builtin.set_fact:
    vault_tpm_helper_demo_tpm2_provider_path: "{{ vault_tpm_helper_demo_tpm2_provider_search.files[0].path if vault_tpm_helper_demo_tpm2_provider_search.matched > 0 else '/usr/lib64/ossl-modules/tpm2.so' }}"

- name: Show TPM2 provider path to use
  ansible.builtin.debug:
    msg: "Using TPM2 provider at: {{ vault_tpm_helper_demo_tpm2_provider_path }}"

- name: Verify OpenSSL can see providers
  ansible.builtin.command: openssl list -providers
  register: vault_tpm_helper_demo_openssl_providers
  changed_when: false

- name: Show OpenSSL providers
  ansible.builtin.debug:
    var: vault_tpm_helper_demo_openssl_providers.stdout_lines

- name: Update library cache
  ansible.builtin.command: ldconfig
  changed_when: false

- name: Configure OpenSSL TPM2 provider
  ansible.builtin.blockinfile:
    path: /etc/ssl/openssl.cnf
    block: |
      [openssl_init]
      providers = provider_sect

      [provider_sect]
      default = default_sect
      tpm2 = tpm2_sect

      [tpm2_sect]
      module = {{ vault_tpm_helper_demo_tpm2_provider_path }}
      activate = 1
    marker: "# {mark} TPM2 Provider Setup for vault-tpm-helper demo"
    backup: yes
  when: vault_tpm_helper_demo_tpm2_provider_search.matched > 0

# Step 1: Generate TPM-backed key in TSS2 format
- name: Generate TPM-backed ECC key in TSS2 format (verbose)
  ansible.builtin.shell:
    cmd: |
      set -x
      # Remove old key if exists
      rm -f /opt/vault-tpm-demo/client.key.pem

      # Generate RSA key with TPM provider (Vault role requires RSA)
      openssl genpkey \
        -provider tpm2 \
        -provider default \
        -propquery '?provider=tpm2' \
        -algorithm RSA \
        -pkeyopt rsa_keygen_bits:2048 \
        -out /opt/vault-tpm-demo/client.key.pem 2>&1

      # Show what was created
      echo "=== Key file header ==="
      head -1 /opt/vault-tpm-demo/client.key.pem
  register: vault_tpm_helper_demo_key_gen

- name: Show key generation output
  ansible.builtin.debug:
    var: vault_tpm_helper_demo_key_gen.stdout_lines

- name: Verify key is in TSS2 format
  ansible.builtin.command:
    cmd: head -1 /opt/vault-tpm-demo/client.key.pem
  register: vault_tpm_helper_demo_key_header
  changed_when: false

- name: Display key format
  ansible.builtin.debug:
    msg: "Key format: {{ vault_tpm_helper_demo_key_header.stdout }}"

- name: Fail if key is not in TSS2 format
  ansible.builtin.fail:
    msg: "Key is not in TSS2 format! Expected 'BEGIN TSS2 PRIVATE KEY', got '{{ vault_tpm_helper_demo_key_header.stdout }}'"
  when: "'TSS2 PRIVATE KEY' not in vault_tpm_helper_demo_key_header.stdout"

# Step 2: Generate CSR from TPM key
- name: Generate Certificate Signing Request
  ansible.builtin.shell:
    cmd: |
      openssl req -provider default -provider tpm2 -new \
        -key /opt/vault-tpm-demo/client.key.pem \
        -out /opt/vault-tpm-demo/client.csr.pem \
        -subj "/CN={{ inventory_hostname }}.{{ domain | default('hashicorp.local') }}"
    creates: /opt/vault-tpm-demo/client.csr.pem

- name: Read CSR content
  ansible.builtin.slurp:
    src: /opt/vault-tpm-demo/client.csr.pem
  register: vault_tpm_helper_demo_csr_data

- name: Set fact for CSR data
  ansible.builtin.set_fact:
    vault_tpm_helper_demo_csr_data_fact: "{{ vault_tpm_helper_demo_csr_data }}"
