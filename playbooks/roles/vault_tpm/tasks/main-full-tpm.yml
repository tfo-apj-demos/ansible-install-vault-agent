---
# roles/vault_tpm/tasks/main-full-tpm.yml - Full TPM integration

# Gather facts if not already gathered (needed for ansible_os_family)
- name: Gather facts for OS detection
  ansible.builtin.setup:
  when: ansible_os_family is not defined

# Check if TPM tools are already installed
- name: Check if tpm2-tools is already installed
  ansible.builtin.command: rpm -q tpm2-tools
  register: tpm2_tools_check
  failed_when: false
  changed_when: false

# Ensure TPM and Vault dependencies are installed on the remote VM
- name: Enable EPEL repository for TPM tools
  ansible.builtin.package:
    name: epel-release
    state: present
  when:
    - ansible_os_family == "RedHat"
    - tpm2_tools_check.rc != 0
  ignore_errors: true  # Skip if repo issues but packages exist

- name: Ensure TPM and Vault dependencies are installed
  ansible.builtin.package:
    name:
      - tpm2-tools
      - tpm2-tss
      - tpm2-pkcs11       # PKCS#11 interface for TPM
      - tpm2-pkcs11-tools # Tools for managing PKCS#11 tokens
      - gnutls-utils      # Provides p11tool for CSR generation
      - openssl
      - unzip
      - curl
    state: present
  when: tpm2_tools_check.rc != 0
  ignore_errors: true  # Skip if repo issues but packages exist

# Install tpm2-abrmd if available (optional - RHEL 9 uses in-kernel resource manager)
- name: Install TPM2 ABRMD (optional)
  ansible.builtin.package:
    name: tpm2-abrmd
    state: present
  ignore_errors: true
  register: abrmd_install

# Add root user to tss group (needed for TPM access)
- name: Add root user to tss group for TPM access
  ansible.builtin.user:
    name: root
    groups: tss
    append: true

# Ensure TPM2 ABRMD service is enabled and running (only if package installed)
- name: Enable and start TPM2 ABRMD service
  ansible.builtin.systemd:
    name: tpm2-abrmd
    enabled: true
    state: started
  when: abrmd_install is succeeded
  ignore_errors: true  # Service may not exist even if package installed

# Create secure directory for TPM key artifacts
- name: Create secure directory for TPM artifacts
  ansible.builtin.file:
    path: /root/tpm
    state: directory
    mode: "0700"
    owner: root
    group: root

# Force regeneration - remove old TPM artifacts if requested
- name: Remove old TPM artifacts for regeneration
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /root/tpm/primary.ctx
    - /root/tpm/key.pub
    - /root/tpm/key.priv
    - /root/tpm/key.ctx
    - /root/tpm/tpm_csr.pem
    - /root/tpm/tpm_public.pem
  when: vault_tpm_force_regenerate | default(false)

# Evict existing persistent key at handle 0x81000000 if regenerating
- name: Evict existing persistent TPM key if it exists
  ansible.builtin.command: tpm2_evictcontrol -C o -c 0x81000000
  failed_when: false  # Ignore errors if handle is not in use
  changed_when: false
  when: vault_tpm_force_regenerate | default(false)

# Create TPM2 primary key context (endorsement hierarchy)
- name: Create TPM2 primary key context
  ansible.builtin.command: >
    tpm2_createprimary -C o -g sha256 -G rsa
    -c /root/tpm/primary.ctx
  args:
    creates: "{{ '/root/tpm/primary.ctx' if not (vault_tpm_force_regenerate | default(false)) else omit }}"

# Create TPM2 keypair (RSA 2048 for TLS compatibility)
- name: Create TPM2 keypair for certificate authentication
  ansible.builtin.command: >
    tpm2_create -C /root/tpm/primary.ctx
    -g sha256 -G rsa
    -u /root/tpm/key.pub
    -r /root/tpm/key.priv
  args:
    creates: "{{ '/root/tpm/key.pub' if not (vault_tpm_force_regenerate | default(false)) else omit }}"

# Load TPM2 key into TPM
- name: Load TPM2 key into TPM context
  ansible.builtin.command: >
    tpm2_load -C /root/tpm/primary.ctx
    -u /root/tpm/key.pub
    -r /root/tpm/key.priv
    -c /root/tpm/key.ctx
  args:
    creates: "{{ '/root/tpm/key.ctx' if not (vault_tpm_force_regenerate | default(false)) else omit }}"

# Check if handle 0x81000000 already has a key
- name: Check if TPM handle 0x81000000 is already in use
  ansible.builtin.command: tpm2_readpublic -c 0x81000000
  register: handle_check
  failed_when: false
  changed_when: false

# Persist TPM2 key to handle 0x81000000 (only if handle is not in use)
- name: Persist TPM2 key to persistent handle
  ansible.builtin.command: >
    tpm2_evictcontrol -C o
    -c /root/tpm/key.ctx
    0x81000000
  when: handle_check.rc != 0  # Only if handle is empty
  register: evict_result

# Read the public key from TPM and export to PEM format
- name: Export TPM public key to PEM format
  ansible.builtin.command: >
    tpm2_readpublic -c 0x81000000
    -f pem
    -o /root/tpm/tpm_public.pem
  args:
    creates: /root/tpm/tpm_public.pem

# Get tpm2-tools version for diagnostics
- name: Check tpm2-tools version
  ansible.builtin.shell: rpm -q tpm2-tools --qf '%{VERSION}'
  register: tpm2_tools_version
  failed_when: false
  changed_when: false

# Check if tpm2_createcsr command is available (tpm2-tools 5.0+)
- name: Check if tpm2_createcsr is available
  ansible.builtin.command: which tpm2_createcsr
  register: tpm2_createcsr_check
  failed_when: false
  changed_when: false

# Display version information
- name: Display TPM tools version info
  ansible.builtin.debug:
    msg:
      - "tpm2-tools version: {{ tpm2_tools_version.stdout | default('unknown') }}"
      - "tpm2_createcsr available: {{ tpm2_createcsr_check.rc == 0 }}"
      - "Note: tpm2_createcsr requires tpm2-tools 5.0 or higher"

# Generate CSR using tpm2_createcsr if available (tpm2-tools 5.0+)
- name: Generate CSR using TPM key via tpm2_createcsr
  ansible.builtin.shell: |
    tpm2_createcsr -c 0x81000000 \
      -g sha256 \
      -s "/CN={{ inventory_hostname }}.{{ domain | default('hashicorp.local') }}" \
      -o /root/tpm/tpm_csr.pem
  args:
    creates: /root/tpm/tpm_csr.pem
  when: tpm2_createcsr_check.rc == 0

# Fallback: Use tpm2-pkcs11 with p11tool for CSR generation (older tpm2-tools)
- name: Initialize tpm2-pkcs11 store
  ansible.builtin.shell: |
    export TPM2_PKCS11_STORE=/root/tpm/pkcs11-store
    mkdir -p $TPM2_PKCS11_STORE

    # Check if already initialized
    if [ ! -f "$TPM2_PKCS11_STORE/tpm2_pkcs11.sqlite3" ]; then
      tpm2_ptool init --path=$TPM2_PKCS11_STORE
    fi
  args:
    creates: /root/tpm/pkcs11-store/tpm2_pkcs11.sqlite3
  when: tpm2_createcsr_check.rc != 0

- name: Create tpm2-pkcs11 token
  ansible.builtin.shell: |
    export TPM2_PKCS11_STORE=/root/tpm/pkcs11-store

    # Check if token already exists
    if ! tpm2_ptool listtokens --path=$TPM2_PKCS11_STORE 2>/dev/null | grep -q "vault-token"; then
      tpm2_ptool addtoken \
        --pid=1 \
        --label=vault-token \
        --userpin=1234 \
        --sopin=5678 \
        --path=$TPM2_PKCS11_STORE
    fi
  register: pkcs11_token_result
  changed_when: "'vault-token' not in pkcs11_token_result.stdout"
  when: tpm2_createcsr_check.rc != 0

- name: Create TPM key via tpm2-pkcs11
  ansible.builtin.shell: |
    export TPM2_PKCS11_STORE=/root/tpm/pkcs11-store

    # Check if key already exists
    if ! tpm2_ptool listobjects --label=vault-token --path=$TPM2_PKCS11_STORE 2>/dev/null | grep -q "vault-key"; then
      tpm2_ptool addkey \
        --label=vault-token \
        --userpin=1234 \
        --algorithm=rsa2048 \
        --key-label=vault-key \
        --path=$TPM2_PKCS11_STORE
    fi
  register: pkcs11_key_result
  changed_when: "'vault-key' not in pkcs11_key_result.stdout"
  when: tpm2_createcsr_check.rc != 0

- name: Generate CSR using p11tool with TPM-backed key
  ansible.builtin.shell: |
    export TPM2_PKCS11_STORE=/root/tpm/pkcs11-store
    export GNUTLS_PIN=1234

    # Find the PKCS#11 key URI
    KEY_URI=$(p11tool --provider=/usr/lib64/pkcs11/libtpm2_pkcs11.so \
      --list-privkeys --login 2>/dev/null | \
      grep "pkcs11:" | head -1 | awk '{print $2}')

    if [ -z "$KEY_URI" ]; then
      echo "ERROR: Could not find PKCS#11 key URI"
      exit 1
    fi

    # Generate CSR using p11tool
    p11tool --provider=/usr/lib64/pkcs11/libtpm2_pkcs11.so \
      --generate-request \
      --load-privkey "$KEY_URI" \
      --login \
      --outfile=/root/tpm/tpm_csr.pem \
      --dn="CN={{ inventory_hostname }}.{{ domain | default('hashicorp.local') }}"

    echo "CSR generated successfully at /root/tpm/tpm_csr.pem"
  args:
    creates: /root/tpm/tpm_csr.pem
  environment:
    GNUTLS_PIN: "1234"
  when: tpm2_createcsr_check.rc != 0

# Ensure CSR was created successfully
- name: Check if TPM CSR exists
  ansible.builtin.stat:
    path: /root/tpm/tpm_csr.pem
  register: vault_tpm_csr_stat
  failed_when: not vault_tpm_csr_stat.stat.exists
  changed_when: false

# Slurp CSR content from remote host
- name: Read CSR content from remote host
  ansible.builtin.slurp:
    src: /root/tpm/tpm_csr.pem
  register: vault_tpm_remote_csr_data

# Validate CSR was read successfully
- name: Validate CSR was read successfully
  ansible.builtin.fail:
    msg: "Failed to read CSR file /root/tpm/tpm_csr.pem from remote host. Check file existence and permissions."
  when: vault_tpm_remote_csr_data.content is not defined or vault_tpm_remote_csr_data.content | length == 0

# Set custom facts to pass metadata to subsequent roles
- name: Set remote CSR data and TPM metadata as facts
  ansible.builtin.set_fact:
    vault_tpm_remote_csr_data_fact: "{{ vault_tpm_remote_csr_data }}"
    vault_tpm_private_key_path: "{{ 'pkcs11:model=SW%20%20%20TPM;token=vault-token;object=vault-key;type=private' if tpm2_createcsr_check.rc != 0 else 'handle:0x81000000' }}"
    vault_tpm_key_type: "tpm"  # Hardware-backed key
    vault_tpm_key_method: "{{ 'pkcs11' if tpm2_createcsr_check.rc != 0 else 'native' }}"
    vault_tpm_public_key_path: "/root/tpm/tpm_public.pem"

# Display success message with TPM details
- name: Display TPM key generation summary
  ansible.builtin.debug:
    msg:
      - "✅ TPM private key and CSR generated for {{ inventory_hostname }}.{{ domain | default('hashicorp.local') }}"
      - "🔐 SECURITY: Using hardware-backed TPM key"
      - "Method: {{ 'tpm2-pkcs11' if tpm2_createcsr_check.rc != 0 else 'tpm2-tools native' }}"
      - "Key Reference: {{ 'PKCS#11 vault-key' if tpm2_createcsr_check.rc != 0 else 'TPM Handle 0x81000000' }}"
      - "Public Key: /root/tpm/tpm_public.pem"
      - "CSR Location: /root/tpm/tpm_csr.pem"
      - "Protection: Hardware TPM 2.0 (key cannot be extracted)"
